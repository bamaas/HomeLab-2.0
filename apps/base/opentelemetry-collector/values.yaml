---
mode: deployment
replicaCount: 1

# contrib image ships the prometheus receiver, k8sattributes + groupbyattrs
# processors that the core image lacks.
image:
  repository: otel/opentelemetry-collector-contrib

command:
  name: otelcol-contrib

serviceAccount:
  create: true
  name: opentelemetry-collector

# No cluster-wide RBAC. Access is granted through a namespace-scoped Role +
# RoleBinding (see rbac.yaml), so the chart preset that would create a
# ClusterRole for k8sattributes stays disabled.
clusterRole:
  create: false

presets:
  kubernetesAttributes:
    enabled: false

config:
  receivers:
    prometheus:
      config:
        scrape_configs:
          - job_name: argocd
            scrape_interval: 30s
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names:
                    - argocd
            relabel_configs:
              # keep only the argocd-server metrics container port
              - source_labels: [__meta_kubernetes_pod_container_port_number]
                regex: "8083"
                action: keep
              # carry the pod IP so k8sattributes can associate the pod
              - source_labels: [__meta_kubernetes_pod_ip]
                target_label: k8s_pod_ip
  processors:
    # prometheus puts k8s_pod_ip on the datapoints; k8sattributes associates on
    # resource attributes, so promote it to the resource first.
    groupbyattrs:
      keys:
        - k8s_pod_ip
    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      filter:
        namespace: argocd
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s_pod_ip
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.replicaset.name
          - k8s.node.name
  exporters:
    otlphttp/victoriametrics:
      metrics_endpoint: http://victoria-metrics-single-server.observability.svc:8428/opentelemetry/v1/metrics
  service:
    pipelines:
      metrics:
        receivers:
          - prometheus
        processors:
          - memory_limiter
          - groupbyattrs
          - k8sattributes
          - batch
        exporters:
          - otlphttp/victoriametrics
