---
mode: deployment
replicaCount: 1

# contrib image ships the prometheus receiver, k8sattributes + groupbyattrs
# processors that the core image lacks.
image:
  repository: otel/opentelemetry-collector-contrib

command:
  name: otelcol-contrib

serviceAccount:
  create: true
  name: opentelemetry-collector

# No cluster-wide RBAC. Access is granted through a namespace-scoped Role +
# RoleBinding (see rbac.yaml), so the chart preset that would create a
# ClusterRole for k8sattributes stays disabled.
clusterRole:
  create: false

presets:
  kubernetesAttributes:
    enabled: false

config:
  receivers:
    prometheus:
      config:
        scrape_configs:
          # One job discovers every argocd component pod and scrapes its
          # container port named "metrics" (application-controller,
          # applicationset-controller, repo-server, server). The `job` label is
          # set per component (e.g. argocd-server-metrics) to match the argocd
          # Grafana dashboard selectors; that value also becomes service.name,
          # which the resource processor re-materializes as the `job` label.
          - job_name: argocd
            scrape_interval: 30s
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names:
                    - argocd
            relabel_configs:
              # keep only container ports named "metrics"
              - source_labels: [__meta_kubernetes_pod_container_port_name]
                regex: metrics
                action: keep
              # per-component job label: <app name>-metrics
              # $$ escapes the collector's env-var expansion so prometheus
              # receives a literal ${1} capture-group reference.
              - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                target_label: job
                replacement: $${1}-metrics
              # carry the pod IP so k8sattributes can associate the pod
              - source_labels: [__meta_kubernetes_pod_ip]
                target_label: k8s_pod_ip
          # Probe external endpoints through the blackbox exporter. The collector
          # scrapes /probe on the exporter, which then probes the target; the
          # standard relabel dance moves the target into the ?target= param and
          # points the scrape at the exporter service.
          - job_name: blackbox
            scrape_interval: 30s
            metrics_path: /probe
            params:
              module:
                - http_2xx
            static_configs:
              - targets:
                  - https://google.com
            relabel_configs:
              - source_labels: [__address__]
                target_label: __param_target
              - source_labels: [__param_target]
                target_label: instance
              - target_label: __address__
                replacement: prometheus-blackbox-exporter.observability.svc:9115
          # CloudNativePG cluster metrics (default namespace). Adds the
          # cluster/namespace/pod labels the CNPG Grafana dashboard expects.
          - job_name: cnpg
            scrape_interval: 30s
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names:
                    - default
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_cnpg_io_cluster]
                regex: .+
                action: keep
              - source_labels: [__meta_kubernetes_pod_container_port_name]
                regex: metrics
                action: keep
              - source_labels: [__meta_kubernetes_pod_label_cnpg_io_cluster]
                target_label: cluster
              - source_labels: [__meta_kubernetes_namespace]
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_name]
                target_label: pod
  processors:
    # prometheus puts k8s_pod_ip on the datapoints; k8sattributes associates on
    # resource attributes, so promote it to the resource first.
    groupbyattrs:
      keys:
        - k8s_pod_ip
    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      filter:
        namespace: argocd
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s_pod_ip
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.replicaset.name
          - k8s.node.name
    # The argocd Grafana dashboards (e.g. grafana.com/dashboards/14584) query
    # Prometheus-native labels: job, namespace, pod, instance. The OTLP path
    # instead produces OpenTelemetry semconv attributes (service.name,
    # k8s.namespace.name, ...), so materialize the classic labels from them.
    resource:
      attributes:
        - key: job
          from_attribute: service.name
          action: upsert
        - key: namespace
          from_attribute: k8s.namespace.name
          action: upsert
        - key: pod
          from_attribute: k8s.pod.name
          action: upsert
        - key: instance
          from_attribute: service.instance.id
          action: upsert
  exporters:
    otlphttp/victoriametrics:
      metrics_endpoint: http://victoria-metrics-single-server.observability.svc:8428/opentelemetry/v1/metrics
    otlphttp/prometheus:
      metrics_endpoint: http://prometheus-server.observability.svc/api/v1/otlp/v1/metrics
  service:
    pipelines:
      metrics:
        receivers:
          - prometheus
        processors:
          - memory_limiter
          - groupbyattrs
          - k8sattributes
          - resource
          - batch
        exporters:
          - otlphttp/victoriametrics
          - otlphttp/prometheus
